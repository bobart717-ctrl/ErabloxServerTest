name: Mobile Revival Server
on: 
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest # Linux швидше піднімає тунелі
    steps:
      - name: Install ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok

      - name: Start Ngrok Tunnel
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok authtoken $NGROK_AUTH_TOKEN
          # Прокидаємо порт для гри (UDP/TCP залежно від налаштувань мобільного клієнта)
          ngrok http 8080 & 
          sleep 5
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'

      - name: Server Keep-Alive
        run: |
          echo "Сервер працює. Чекаю на ручну зупинку (max 6 годин)..."
          sleep 21600
