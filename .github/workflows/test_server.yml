name: ERaBlox Test Server (6 Hours)
on: 
  workflow_dispatch: # Кнопка ручного запуску в Actions

jobs:
  server-host:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Get Server Info
        run: |
          echo "--------------------------------------------------"
          echo "СЕРВЕР ERABLOX ЗАПУЩЕНО"
          echo "Він буде активний 6 годин або до твоєї зупинки."
          echo "Твій публічний IP для тесту:"
          curl -s https://ifconfig.me
          echo -e "\n--------------------------------------------------"

      - name: Run Web Server and Keep-Alive
        run: |
          # Запускаємо сервер на фоні (порт 8080)
          # Він буде віддавати всі файли: join.lua, asset.rbxl тощо.
          python3 -m http.server 8080 & 
          
          echo "Веб-сервер роздає файли на порту 8080..."
          
          # Заглушка на 6 годин (21600 секунд)
          # Процес буде "висіти" тут, поки час не вийде або ти не натиснеш Cancel
          sleep 21600

      - name: On Shutdown
        if: cancelled()
        run: echo "Сервер зупинено користувачем вручну."
